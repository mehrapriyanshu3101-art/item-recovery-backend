# 1. SERVER CONFIGURATION
# This tells Spring Boot to use the port Render assigns, or default to 8080
server.port=${PORT:8080}

# 2. DATABASE CONNECTION (Aiven MySQL)
# Includes SSL requirements and time zone fixes to ensure a stable handshake
spring.datasource.url=${DB_URL}
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / HIBERNATE SETTINGS
# Explicitly setting the Dialect prevents the "Unable to determine Dialect" error
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. CONNECTION POOLING (Hikari)
# Helps manage connections efficiently in a cloud environment
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
