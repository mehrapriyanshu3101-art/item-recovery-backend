# 1. SERVER SETTINGS
# This tells Render exactly where to look for your app
spring.application.name=foundit
server.port=${PORT:8080}

# 2. DATABASE SETTINGS
# Replace the placeholder with your actual Aiven/MySQL connection string
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 3. HIBERNATE / JPA SETTINGS
# 'update' will create tables automatically if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. CONNECTION POOLING (Prevents 'Timed Out' crashes)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Email API Settings (Resend)
# Set these in Render environment variables:
# RESEND_API_KEY=re_xxxxx
# MAIL_FROM=FoundIt <onboarding@resend.dev> (or your verified domain sender)
